work:
  label: Work experiences
  entries:
    - role: Enterprise Systems Engineer
      company: Meta Platforms, Inc.
      from: 2022
      to: present
      description: >-
        Part of the enterprise virtualization team responsible for Meta's corporate virtualization infrastructure — the multi-region fleet running internal engineering, IT, and corporate-systems workloads.
      highlights:
        - Founding member of the cross-team AI initiative pioneering autonomous operations across the enterprise department (~35 teams, ~1100 engineers); co-built the agent automating alert triage and resolution end-to-end.
        - Ranked 1st in org by significant lines of code in both 2024 and 2025 — ~40% of the entire org's annual code production in 2025.
        - "Designed and rolled out hypervisor patching automation with self-service VM relocation, cutting per-host drain turnaround from 3.5+ days to 1.9 days (45.8% time savings) and shrinking maintenance windows for downstream teams; led the multi-team project end-to-end, negotiating cross-team SLAs (4–24 hrs) with partner orgs."
        - Replaced the legacy template-distribution daemon with the new framework, cutting OS template propagation from 4–5 days to 1–2 days (~60% faster) — accelerating fleet-wide OS rollouts and security patch adoption — and freeing 27 TB across the global virtualization control plane on the first production run.
        - "As reliability champion for the team, stabilized the workflow framework in production: cut OOM-driven incidents by >99.7%, drastically reducing oncall burden, and deprecated a worker tier, freeing up resource requirements by 40%."
    - role: Systems Development Area Leader
      company: Immobiliare.it S.p.A.
      from: 2021
      to: 2022
      description: >-
        Promoted to lead the Systems Development area, driving custom-built tooling and platforms tailored to the systems and infrastructure organization's needs.
      highlights:
        - "Designed and shipped [*inca*](https://github.com/immobiliare/inca), the company-wide internal CA and certificate-management platform — automating certificate flows across 3 datacenters, hundreds of internal services, and tens of public-facing ones, and consolidating the previously fragmented workflows behind one API, seamlessly integrated into infrastructure code via a dedicated Terraform provider for self-service lifecycle management; drove the open-source release of the project."
    - role: Site Reliability Engineer
      company: Immobiliare.it S.p.A.
      from: 2020
      to: 2021
      description: >-
        Engineered and automated systems infrastructure, with consistent monitoring across the estate.
      highlights:
        - Initiated and led the migration of the configuration-management platform from SaltStack to Terraform + Ansible — hundreds of hosts and states in scope — and coauthored a shared Terraform module exposing a curated surface over the underlying Terraform and Ansible codebases, letting subteams own their deployment procedures without re-implementing them.
        - Designed and shipped the company's first CI pipeline for infrastructure-as-code, spinning up sandboxed full-stack environments per PR (VM deploy → service exposure → pyunit assertions) across the full SaltStack codebase where no automated testing existed before.
    - role: Software Engineering Consultant
      company: Kubique S.p.A.
      from: 2018
      to: 2019
      description: >-
        Developed software tools for the open banking ecosystem using Java EE stack and aspect oriented programming.
    - role: Co-founder and CTO
      company: Cellula S.r.l.
      from: 2016
      to: 2018
      description: >-
        Developed web-applications and administered customers infrastructures and services.
    - role: Systems Engineer
      company: I-node S.r.l.
      from: 2014
      to: 2018
      description: >-
        Administered network infrastructures and interfaced with customers to cover Tier 1/2 support.

