work:
  label: Esperienze lavorative
  entries:
    - role: Enterprise Systems Engineer
      company: Meta Platforms, Inc.
      from: 2022
      to: presente
      description: >-
        Membro del team responsabile dell'infrastruttura di virtualizzazione IT globale di Meta.
      highlights:
        - Membro fondatore dell'iniziativa AI cross-team per le autonomous operations nel dipartimento enterprise (~35 team, ~1100 ingegneri) e co-realizzatore del relativo AI agent per l'automatizzazione del triage e della risoluzione degli alert end-to-end.
        - Primo per significant lines of code nel 2024 e nel 2025, raggiungendo individualmente il ~40% della produzione annuale di codice dell'organizzazione nel 2025.
        - "Progettata e rilasciata l'automazione del patching degli hypervisor con rilocazione self-service delle VM, riducendo il drenaggio degli hypervisor da oltre 3,5 a 1,9 giorni (45,8% di risparmio) e accorciando le finestre di manutenzione per i team downstream; guidato il progetto multi-team end-to-end, negoziando SLA cross-team (4–24 ore) con organizzazioni partner."
        - Progettato e sostituito il vecchio servizio di distribuzione dei template per le VM, riducendo la loro propagazione da 4–5 a 1–2 giorni (~60% più veloce), accelerando il rollout degli aggiornamenti e l'adozione di patch di sicurezza e liberando 27 TB sull'intero control plane di virtualizzazione globale alla prima esecuzione in produzione.
        - In qualità di reliability champion del team, stabilizzato il framework utilizzato dal team per l'esecuzione di workflow, riducendo il tasso di OOM di oltre il 99,7%, abbattendo il carico sui turni di reperibilità, e ridotto i requisiti delle sue risorse del 40%.
    - role: Systems Development Area Leader
      company: Immobiliare.it S.p.A.
      from: 2021
      to: 2022
      description: >-
        Ho orchestrato e gestito lo sviluppo di software orientati ai sistemi e alle infrastrutture.
    - role: Site Reliability Engineer
      company: Immobiliare.it S.p.A.
      from: 2020
      to: 2022
      description: >-
        Ho progettato e realizzato infrastrutture di rete, scritto codice per automatizzare procedure e processi nelle reti e i sistemi amministrate, e li ho manutenuti realizzando sistemi di monitoraggio consistenti.
    - role: Consulente Sviluppatore
      company: Kubique S.p.A.
      from: 2018
      to: 2019
      description: >-
        Ho sviluppato strumenti software per l'ecosistema dell'open banking utilizzando lo stack Java EE stack e la programmazione orientata agli aspetti.
    - role: Co-fondatore e CTO
      company: Cellula S.r.l.
      from: 2016
      to: 2018
      description: >-
        Ho sviluppato web-applications e gestito le infrastrutture destinati ai clienti.
    - role: Amministratore di sistemi
      company: I-node S.r.l.
      from: 2014
      to: 2018
      description: >-
        Ho amministrato infrastrutture di rete e mi sono interfacciato con clienti per supporto Tier 1/2.

