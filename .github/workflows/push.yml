name: push

on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null

permissions:
  actions: read
  attestations: none
  checks: none
  contents: read
  deployments: none
  id-token: none
  issues: none
  discussions: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-linter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: ln -sv .github/linters/commitlint.config.js ./
      - uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ !contains(github.event_name, 'pull_request') }}
          VALIDATE_JSCPD: false
          VALIDATE_JAVASCRIPT_ES: false
          # mypy runs in its own job so it can use the project's uv venv
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_PYLINT: false
          IGNORE_GITIGNORED_FILES: true
          SAVE_SUPER_LINTER_OUTPUT: false
          MULTI_STATUS: false
          LOG_LEVEL: WARN
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.12
      - run: |
          uv sync --frozen
          uv run mypy --strict
  notify-doc:
    needs: [super-linter, mypy]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: streambinder-dispatch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2
          persist-credentials: false
      # resolve parent SHA so force pushes don't break paths-filter
      - id: parent
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          base: ${{ steps.parent.outputs.sha }}
          filters: |
            docs:
              - 'docs/**'
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        if: steps.filter.outputs.docs == 'true'
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_STREAMBINDER }}
          repository: streambinder/streambinder
          event-type: doc-sync
          client-payload: '{"repo": "${{ github.repository }}", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
  changes:
    needs: [super-linter, mypy]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2
          persist-credentials: false
      # resolve parent SHA so force pushes don't break paths-filter
      - id: parent
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          base: ${{ steps.parent.outputs.sha }}
          filters: |
            src:
              - 'src/**'
  build:
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.date.outputs.today }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.12
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y texlive-latex-recommended texlive-fonts-extra
      - name: Install Python dependencies
        run: uv sync --frozen
      - name: Build
        run: make
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: resume
          path: build/*
      - name: Generate date output
        id: date
        run: echo today="$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.date.outputs.today }}
        run: |
          set -euo pipefail

          api="repos/${GITHUB_REPOSITORY}"
          mapfile -d '' release_files < <(find build -maxdepth 1 -type f -print0 | sort -z)

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release files found in build/"
            exit 1
          fi

          # Keep a single daily release tag, updating it when multiple pushes land the same day.
          if gh api "${api}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "${api}/git/refs/tags/${TAG_NAME}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true
          else
            gh api \
              --method POST \
              "${api}/git/refs" \
              -f ref="refs/tags/${TAG_NAME}" \
              -f sha="${GITHUB_SHA}"
          fi

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}"
            gh release upload "${TAG_NAME}" "${release_files[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG_NAME}" "${release_files[@]}" --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}" --target "${GITHUB_SHA}"
          fi
  notify-release:
    needs: [build]
    runs-on: ubuntu-latest
    environment: streambinder-dispatch
    steps:
      - name: Dispatch push event
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_STREAMBINDER }}
          repository: streambinder/streambinder
          event-type: erro-sync
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "tag": "${{ needs.build.outputs.tag }}"}'
