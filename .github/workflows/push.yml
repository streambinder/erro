name: push

on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null

permissions:
  actions: read
  attestations: none
  checks: none
  contents: read
  deployments: none
  id-token: none
  issues: none
  discussions: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

concurrency: # prevent concurrent tag/release
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  super-linter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: ln -sv .github/linters/commitlint.config.js ./
      - uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ !contains(github.event_name, 'pull_request') }}
          VALIDATE_JSCPD: false
          VALIDATE_JAVASCRIPT_ES: false
  notify-doc:
    needs: [super-linter]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: streambinder-dispatch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        if: steps.filter.outputs.docs == 'true'
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_STREAMBINDER }}
          repository: streambinder/streambinder
          event-type: doc-sync
          client-payload: '{"repo": "${{ github.repository }}", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
  build:
    needs: [super-linter]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Setup Python environment
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.8.12
          architecture: x64
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y texlive-latex-recommended texlive-fonts-extra
      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Build
        run: make
      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: resume
          path: build/*
      - name: Generate date output
        id: date
        run: echo today="$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.date.outputs.today }}
        run: |
          set -euo pipefail

          api="repos/${GITHUB_REPOSITORY}"

          # Keep a single daily release tag, updating it when multiple pushes land the same day.
          if gh api "${api}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "${api}/git/refs/tags/${TAG_NAME}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true
          else
            gh api \
              --method POST \
              "${api}/git/refs" \
              -f ref="refs/tags/${TAG_NAME}" \
              -f sha="${GITHUB_SHA}"
          fi

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}"
            gh release upload "${TAG_NAME}" build/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG_NAME}" build/* --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}" --target "${GITHUB_SHA}"
          fi
  notify-release:
    needs: [build]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: streambinder-dispatch
    steps:
      - name: Dispatch push event
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_STREAMBINDER }}
          repository: streambinder/streambinder
          event-type: erro-sync
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
